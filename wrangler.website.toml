# Marketing site (website/) → https://core.zenuml.com
# Deliberately separate from wrangler.toml (zenuml-web-renderer, dist/) so CI's
# deploy-to-cloudflare job is untouched. Deploy: npx wrangler deploy --config wrangler.website.toml
name = "zenuml-core-website"
compatibility_date = "2026-07-02"

routes = [
  { pattern = "core.zenuml.com", custom_domain = true }
]

[assets]
directory = "website"
not_found_handling = "404-page"
