name: Update Playwright Snapshots for Linux

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-snapshots:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Install Playwright browsers
        run: bun run pw:install

      - name: Install Playwright Chromium for CLI PNG tests
        run: npx playwright-core install --with-deps chromium

      - name: Build site
        run: bun run build:site

      - name: Generate Linux Playwright snapshots
        run: bun run pw:update-ci
        env:
          CI: true

      - name: Generate Linux CLI PNG snapshots
        run: bun run test --run
        env:
          CI: true
          UPDATE_SNAPSHOTS: "1"

      - name: Commit updated snapshots
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add tests/ test/fixtures/cli/snapshots/
          if ! git diff --staged --quiet; then
            git commit -m "chore: update Playwright and CLI PNG snapshots for Linux CI

            Generated Linux-specific snapshots for chromium-linux platform.

            🤖 Generated with [Claude Code](https://claude.ai/code)

            Co-Authored-By: Claude <noreply@anthropic.com>"
            git push
          else
            echo "No snapshot changes to commit"
          fi

      - name: Verify snapshots pass
        run: bun run pw:ci
        env:
          CI: true

      - name: Verify CLI PNG snapshots pass
        run: bun run test --run
        env:
          CI: true
