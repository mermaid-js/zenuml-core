<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- core.zenuml.com favicon — landing-page design language:
       teal (#0F766E) square, zero border-radius, white sequence-diagram glyph
       (two participants, dashed lifelines, one message arrow) -->
  <rect width="64" height="64" fill="#0F766E"/>
  <g stroke="#FFFFFF" fill="none">
    <!-- participant boxes -->
    <rect x="10" y="10" width="16" height="11" stroke-width="3"/>
    <rect x="38" y="10" width="16" height="11" stroke-width="3"/>
    <!-- lifelines -->
    <line x1="18" y1="21" x2="18" y2="54" stroke-width="2.5" stroke-dasharray="4.5 3.5"/>
    <line x1="46" y1="21" x2="46" y2="54" stroke-width="2.5" stroke-dasharray="4.5 3.5"/>
    <!-- message arrow -->
    <line x1="18" y1="36" x2="43" y2="36" stroke-width="3.5"/>
    <path d="M36 29.5 L44.5 36 L36 42.5" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
